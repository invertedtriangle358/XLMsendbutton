 <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.js"></script>
      
<style>
.xlm-pay-amount {
    padding: 10px;
    width: 250px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

.xlm-pay-btn {
    background-color: #0866ff;
    color: white;
    border: none;
    padding: 12px 24px;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    width: 250px;
    font-weight: bold;
}

.xlm-pay-qrcode {
    margin-top: 15px;
    display: none;
    border: 1px solid #ccc;
    padding: 10px;
    border-radius: 8px;
    width: 200px;
    height: 200px;
    margin-left: auto;
    margin-right: auto;
}
</style>
<input
    id="stellar-amount"
    class="xlm-pay-amount"
    type="text"
    inputmode="decimal"
    placeholder="Amount XLM"
>
<button id="stellar-pay-btn" class="xlm-pay-btn">
    Send XLM
</button>
<canvas id="qrcode-canvas" class="xlm-pay-qrcode"></canvas>
      
<script>
(() => {
    const DESTINATION = "YOUR_STELLAR_ADDRESS_HERE";
    const MEMO_TEXT = "Tip";
    const QR_SIZE = 200;
    const btn = document.getElementById("stellar-pay-btn");
    const amountInput = document.getElementById("stellar-amount");
    const canvas = document.getElementById("qrcode-canvas");


    if (!btn || !amountInput || !canvas) {
        return;
    }
    function isValidXlmAmount(value) {
        if (!/^(0|[1-9]\d*)(\.\d{1,7})?$/.test(value)) {
            return false;
        }

        if (value === "0") {
            return false;
        }

        return true;
    }
    btn.addEventListener("click", async () => {
        if (
            !DESTINATION ||
            DESTINATION === "YOUR_STELLAR_ADDRESS_HERE"
        ) {
            alert("Please set Stellar address");
            return;
        }
        const amount = amountInput.value.trim();
        if (!isValidXlmAmount(amount)) {
            alert("Enter a valid XLM amount");
            return;
        }
        const stellarUri =
        `web+stellar:pay?destination=${DESTINATION}&amount=${amount}&memo=${encodeURIComponent(MEMO_TEXT)}&memo_type=MEMO_TEXT`;
        const isMobile =
        /Android|iPhone|iPad/i.test(navigator.userAgent);
        if (isMobile) {
            canvas.style.display = "none";
            setTimeout(() => {
                window.location.assign(stellarUri);
            }, 100);
        } else {
            try {
                canvas.style.display = "none";
                await QRCode.toCanvas(
                    canvas,
                    stellarUri,
                    {
                        width: QR_SIZE
                    }
                );
                canvas.style.display = "block";
            } catch (err) {
                console.error(
                    "Failed to generate QR code:",
                    err
                );
            }
        }
    });
})();
</script>
